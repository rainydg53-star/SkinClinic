spring.config.import=optional:file:.env[.properties],optional:file:skinclinic-back/.env[.properties]

server.port=${SERVER_PORT}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL}
logging.level.org.hibernate.type.descriptor.sql=${LOGGING_LEVEL_HIBERNATE_SQL}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE}
spring.servlet.multipart.maxFileSize=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
spring.servlet.multipart.maxRequestSize=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}
itemImgLocation=${ITEM_IMG_LOCATION}
uploadPath=${UPLOAD_PATH}
spring.jpa.properties.hibernate.default_batch_fetch_size=${SPRING_JPA_DEFAULT_BATCH_FETCH_SIZE}
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE}
app.frontend-url=${APP_FRONTEND_URL}
kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}
kakaopay.secret-key=${KAKAOPAY_SECRET_KEY}
kakaopay.cid=${KAKAOPAY_CID}
kakaopay.base-url=${KAKAOPAY_BASE_URL}
portone.api-secret=${PORTONE_API_SECRET}
portone.store-id=${PORTONE_STORE_ID}
portone.channel-key=${PORTONE_CHANNEL_KEY}
portone.api-base-url=${PORTONE_API_BASE_URL}
# WebSocket session policy: allow up to 2 concurrent sessions per user, reject the 3rd+
app.chat.max-websocket-sessions-per-user=${APP_CHAT_MAX_WEBSOCKET_SESSIONS_PER_USER}
# Payments left in READY longer than this are treated as abandoned.
app.payment.ready-timeout-minutes=${APP_PAYMENT_READY_TIMEOUT_MINUTES}

# Notification delivery providers (real delivery mode)
notification.kakao.provider=${NOTIFICATION_KAKAO_PROVIDER}
notification.kakao.auth-api-base-url=${KAKAO_AUTH_API_BASE_URL}
notification.kakao.message-api-base-url=${KAKAO_MESSAGE_API_BASE_URL}
notification.kakao.rest-api-key=${KAKAO_REST_API_KEY}
notification.kakao.client-secret=${KAKAO_CLIENT_SECRET}
notification.kakao.web-url=${KAKAO_WEB_URL}
notification.kakao.mobile-web-url=${KAKAO_MOBILE_WEB_URL}
notification.kakao.button-title=${KAKAO_BUTTON_TITLE}

notification.sms.provider=${NOTIFICATION_SMS_PROVIDER}
notification.sms.solapi.api-key=${SOLAPI_API_KEY}
notification.sms.solapi.api-secret=${SOLAPI_API_SECRET}
notification.sms.solapi.sender-number=${SOLAPI_SENDER_NUMBER}
notification.sms.solapi.domain=${SOLAPI_DOMAIN}

# Gemini chatbot
gemini.api.key=${GEMINI_CHAT_API_KEY}
gemini.base-url=${GEMINI_BASE_URL}
gemini.model=${GEMINI_MODEL}

# Gemini Vision
app.gemini.api-key=${GEMINI_VISION_API_KEY}
app.gemini.model=${GEMINI_VISION_MODEL}
